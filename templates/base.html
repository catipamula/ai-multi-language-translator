<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}AI Multi-Language Translator{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg floating-nav">
        <div class="container">
            <a class="navbar-brand brand-lockup" href="{{ url_for('index') }}">
                <span class="brand-mark"><i class="fa-solid fa-language"></i></span>
                <span>AI Translator</span>
            </a>
            <div class="nav-actions">
                <a class="nav-link" href="{{ url_for('history_page') }}">History</a>
                <button class="icon-button" id="themeToggle" type="button" aria-label="Toggle theme" title="Toggle theme">
                    <i class="fa-solid fa-moon"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="page-shell">
        {% block content %}{% endblock %}
    </main>

    <div class="toast-container position-fixed top-0 end-0 p-3" id="toastContainer"></div>

    <footer class="app-footer">
        Built with Flask + Python
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
